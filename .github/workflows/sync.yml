name: Universal Blast Radius Sync

on:
  push:
    branches:
      - main

jobs:
  sync-registry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Schema
        run: |
          # FOR NOW: Hardcoding a dummy schema just to test the pipeline.
          # LATER: You will replace this line with your MERN/Spring Boot extraction script!
          echo '{ "userId": "string", "fullName": "string" }' > live-schema.txt

      - name: Sync to Central Registry
        run: |
          LIVE_SCHEMA=$(cat live-schema.txt)
          CURRENT_REPO="${{ github.repository }}"
          
          # This jq command safely converts dependencies.txt into a clean JSON array
          JSON_PAYLOAD=$(jq -n \
            --arg name "$CURRENT_REPO" \
            --arg schema "$LIVE_SCHEMA" \
            --rawfile deps dependencies.txt \
            '{
              serviceName: $name, 
              dependencies: ($deps | split("\n") | map(select(length > 0))), 
              apiContractSchema: $schema
            }')
          
          echo "Payload generated successfully. Sending..."
          
          # 🚨 IMPORTANT: Replace this URL with your Ngrok URL while testing locally!
          curl -X POST "https://iraida-tantalous-lionel.ngrok-free.dev/api/v1/registry/sync" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD"
